<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Sono e Amamentação</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .baby-filter {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .baby-info {
            background: #f0f4ff;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            color: #667eea;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-box {
            background: #f8f9ff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .chart-box h3 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 15px 30px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-section {
            background: #f8f9ff;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .btn-warning {
            background: #ed8936;
            color: white;
        }

        .btn-warning:hover {
            background: #dd6b20;
        }

        .btn-info {
            background: #4299e1;
            color: white;
        }

        .btn-info:hover {
            background: #3182ce;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-label input[type="radio"] {
            width: auto;
        }

        .time-controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 10px;
        }

        .status-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-active {
            background: #48bb78;
            color: white;
        }

        .status-inactive {
            background: #cbd5e0;
            color: #4a5568;
        }

        .records-section {
            margin-top: 30px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #667eea;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 30px;
            cursor: pointer;
            color: #999;
        }

        .close-modal:hover {
            color: #333;
        }

        .bottle-options {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f0f4ff;
            border-radius: 8px;
        }

        .bottle-options.active {
            display: block;
        }

        .action-btn {
            background: none;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin-right: 5px;
            transition: all 0.3s;
        }

        .edit-btn {
            background: #4299e1;
            color: white;
        }

        .edit-btn:hover {
            background: #3182ce;
        }

        .delete-btn {
            background: #f56565;
            color: white;
        }

        .delete-btn:hover {
            background: #e53e3e;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .charts-container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .header-section {
                flex-direction: column;
                align-items: stretch;
            }

            .time-controls {
                flex-direction: column;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        input[type="datetime-local"] {
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👶 Registro de Sono e Amamentação</h1>

        <!-- Cabeçalho com Filtro e Info do Bebê -->
        <div class="header-section">
            <div class="baby-filter">
                <label for="babyFilterChart">Filtrar por bebê:</label>
                <select id="babyFilterChart" onchange="updateCharts()">
                    <option value="all">Todos os bebês</option>
                </select>
            </div>
            <div class="baby-info" id="babyInfo">
                Cadastre um bebê para começar
            </div>
            <button class="btn btn-primary" onclick="openBabyModal()">➕ Cadastrar Bebê</button>
        </div>

        <!-- Gráficos -->
        <div class="charts-container">
            <div class="chart-box">
                <h3>📊 Amamentações - Últimos 7 Dias</h3>
                <canvas id="feedingChart"></canvas>
            </div>
            <div class="chart-box">
                <h3>😴 Sonos - Últimos 7 Dias</h3>
                <canvas id="sleepChart"></canvas>
            </div>
        </div>

        <!-- Abas -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('register')">📝 Registrar</button>
            <button class="tab" onclick="switchTab('records')">📋 Histórico</button>
        </div>

        <!-- Conteúdo Aba Registrar -->
        <div id="registerTab" class="tab-content active">
            <div class="form-section">
                <h2 style="color: #667eea; margin-bottom: 20px;">Selecione o Bebê</h2>
                <div class="form-group">
                    <label for="selectedBaby">Bebê:</label>
                    <select id="selectedBaby" onchange="updateBabySelection()">
                        <option value="">Selecione um bebê</option>
                    </select>
                </div>
            </div>

            <!-- Registro de Amamentação -->
            <div class="form-section">
                <h2 style="color: #667eea; margin-bottom: 20px;">🍼 Amamentação</h2>
                
                <div class="form-group">
                    <label>Tipo de Amamentação:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="feedingType" value="left" checked onchange="toggleBottleOptions()">
                            Peito Esquerdo
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="feedingType" value="right" onchange="toggleBottleOptions()">
                            Peito Direito
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="feedingType" value="bottle" onchange="toggleBottleOptions()">
                            Mamadeira
                        </label>
                    </div>
                </div>

                <div id="bottleOptions" class="bottle-options">
                    <div class="form-group">
                        <label>Tipo de Leite:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="milkType" value="breast" checked>
                                Leite Materno
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="milkType" value="formula">
                                Fórmula
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="milkAmount">Quantidade (ml):</label>
                        <input type="number" id="milkAmount" min="0" placeholder="Ex: 120">
                    </div>
                </div>

                <div class="time-controls">
                    <button class="btn btn-success" id="startFeedingBtn" onclick="startFeeding()">
                        ▶️ Iniciar Amamentação
                    </button>
                    <button class="btn btn-danger" id="stopFeedingBtn" onclick="stopFeeding()" disabled>
                        ⏹️ Finalizar Amamentação
                    </button>
                    <span id="feedingStatus" class="status-indicator status-inactive">Inativo</span>
                    <span id="feedingTimer"></span>
                </div>
            </div>

            <!-- Registro de Sono -->
            <div class="form-section">
                <h2 style="color: #667eea; margin-bottom: 20px;">😴 Sono</h2>
                
                <div class="time-controls">
                    <button class="btn btn-success" id="startSleepBtn" onclick="startSleep()">
                        ▶️ Iniciar Sono
                    </button>
                    <button class="btn btn-danger" id="stopSleepBtn" onclick="stopSleep()" disabled>
                        ⏹️ Finalizar Sono
                    </button>
                    <span id="sleepStatus" class="status-indicator status-inactive">Inativo</span>
                    <span id="sleepTimer"></span>
                </div>
            </div>
        </div>

        <!-- Conteúdo Aba Histórico -->
        <div id="recordsTab" class="tab-content">
            <div class="records-section">
                <h2 style="color: #667eea; margin-bottom: 20px;">📋 Histórico de Registros</h2>
                
                <div class="filters">
                    <div>
                        <label for="filterBaby">Bebê:</label>
                        <select id="filterBaby" onchange="filterRecords()">
                            <option value="all">Todos</option>
                        </select>
                    </div>
                    <div>
                        <label for="filterType">Tipo:</label>
                        <select id="filterType" onchange="filterRecords()">
                            <option value="all">Todos</option>
                            <option value="feeding">Amamentação</option>
                            <option value="sleep">Sono</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: flex-end;">
                        <button class="btn btn-info" onclick="exportToExcel()">
                            📥 Exportar para Excel
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="recordsTable">
                        <thead>
                            <tr>
                                <th>Bebê</th>
                                <th>Tipo</th>
                                <th>Detalhes</th>
                                <th>Início</th>
                                <th>Fim</th>
                                <th>Duração</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="recordsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Cadastro de Bebê -->
    <div id="babyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastrar Novo Bebê</h2>
                <button class="close-modal" onclick="closeBabyModal()">&times;</button>
            </div>
            <form onsubmit="saveBaby(event)">
                <div class="form-group">
                    <label for="babyName">Nome:</label>
                    <input type="text" id="babyName" required>
                </div>
                <div class="form-group">
                    <label for="babyBirthdate">Data de Nascimento:</label>
                    <input type="date" id="babyBirthdate" required>
                </div>
                <div class="form-group">
                    <label>Sexo:</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="babyGender" value="M" checked>
                            Masculino
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="babyGender" value="F">
                            Feminino
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">💾 Salvar Bebê</button>
            </form>
        </div>
    </div>

    <!-- Modal Editar Registro -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✏️ Editar Registro</h2>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <form onsubmit="saveEditRecord(event)">
                <input type="hidden" id="editRecordIndex">
                
                <div class="form-group">
                    <label for="editBaby">Bebê:</label>
                    <select id="editBaby" required>
                    </select>
                </div>

                <div class="form-group">
                    <label for="editType">Tipo:</label>
                    <select id="editType" onchange="updateEditFormFields()" required>
                        <option value="feeding">🍼 Amamentação</option>
                        <option value="sleep">😴 Sono</option>
                    </select>
                </div>

                <div id="editFeedingFields">
                    <div class="form-group">
                        <label>Tipo de Amamentação:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="editFeedingType" value="left" onchange="toggleEditBottleOptions()">
                                Peito Esquerdo
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="editFeedingType" value="right" onchange="toggleEditBottleOptions()">
                                Peito Direito
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="editFeedingType" value="bottle" onchange="toggleEditBottleOptions()">
                                Mamadeira
                            </label>
                        </div>
                    </div>

                    <div id="editBottleOptions" class="bottle-options">
                        <div class="form-group">
                            <label>Tipo de Leite:</label>
                            <div class="radio-group">
                                <label class="radio-label">
                                    <input type="radio" name="editMilkType" value="breast">
                                    Leite Materno
                                </label>
                                <label class="radio-label">
                                    <input type="radio" name="editMilkType" value="formula">
                                    Fórmula
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="editMilkAmount">Quantidade (ml):</label>
                            <input type="number" id="editMilkAmount" min="0">
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editStartTime">Data/Hora Início:</label>
                        <input type="datetime-local" id="editStartTime" required>
                    </div>
                    <div class="form-group">
                        <label for="editEndTime">Data/Hora Fim:</label>
                        <input type="datetime-local" id="editEndTime" required>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
                    <button type="button" class="btn btn-danger" onclick="closeEditModal()">❌ Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Dados em LocalStorage
        let babies = JSON.parse(localStorage.getItem('babies')) || [];
        let records = JSON.parse(localStorage.getItem('records')) || [];
        let activeFeeding = null;
        let activeSleep = null;
        let feedingInterval = null;
        let sleepInterval = null;

        // Inicialização
        document.addEventListener('DOMContentLoaded', function() {
            loadBabies();
            updateCharts();
            loadRecords();
            checkActiveTimers();
        });

        // Função para obter data/hora no fuso do Brasil
        function getBrazilDateTime() {
            return new Date().toLocaleString('pt-BR', {
                timeZone: 'America/Sao_Paulo',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }

        function getBrazilDateTimeISO() {
            const date = new Date();
            return new Date(date.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
        }

        // Converter Date para formato datetime-local input
        function dateToDatetimeLocal(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `$${year}-$${month}-$${day}T$${hours}:${minutes}`;
        }

        // Modal de Bebê
        function openBabyModal() {
            document.getElementById('babyModal').classList.add('active');
        }

        function closeBabyModal() {
            document.getElementById('babyModal').classList.remove('active');
            document.getElementById('babyName').value = '';
            document.getElementById('babyBirthdate').value = '';
        }

        // Salvar Bebê
        function saveBaby(event) {
            event.preventDefault();
            
            const baby = {
                id: Date.now(),
                name: document.getElementById('babyName').value,
                birthdate: document.getElementById('babyBirthdate').value,
                gender: document.querySelector('input[name="babyGender"]:checked').value
            };

            babies.push(baby);
            localStorage.setItem('babies', JSON.stringify(babies));
            
            closeBabyModal();
            loadBabies();
            updateCharts();
            
            alert('Bebê cadastrado com sucesso! 🎉');
        }

        // Carregar Bebês nos Selects
        function loadBabies() {
            const selects = [
                document.getElementById('selectedBaby'),
                document.getElementById('filterBaby'),
                document.getElementById('babyFilterChart'),
                document.getElementById('editBaby')
            ];

            selects.forEach(select => {
                const currentValue = select.value;
                const isFilter = select.id !== 'selectedBaby' && select.id !== 'editBaby';
                
                select.innerHTML = isFilter ? '<option value="all">Todos</option>' : '<option value="">Selecione um bebê</option>';
                
                babies.forEach(baby => {
                    const option = document.createElement('option');
                    option.value = baby.id;
                    option.textContent = baby.name;
                    select.appendChild(option);
                });

                if (currentValue) {
                    select.value = currentValue;
                }
            });

            updateBabySelection();
        }

        // Calcular idade do bebê
        function calculateAge(birthdate) {
            const birth = new Date(birthdate);
            const today = getBrazilDateTimeISO();
            
            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            let days = today.getDate() - birth.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            return { years, months, days };
        }

        // Atualizar informações do bebê selecionado
        function updateBabySelection() {
            const babyId = document.getElementById('babyFilterChart').value;
            const babyInfo = document.getElementById('babyInfo');

            if (babyId === 'all' || !babyId) {
                babyInfo.textContent = babies.length > 0 ? 'Todos os bebês' : 'Cadastre um bebê para começar';
                return;
            }

            const baby = babies.find(b => b.id == babyId);
            if (baby) {
                const age = calculateAge(baby.birthdate);
                babyInfo.innerHTML = `
                    <strong>$${baby.name}</strong> $${baby.gender === 'M' ? '👦' : '👧'}<br>
                    $${age.years} ano(s), $${age.months} mês(es) e ${age.days} dia(s)
                `;
            }
        }

        // Toggle opções de mamadeira
        function toggleBottleOptions() {
            const feedingType = document.querySelector('input[name="feedingType"]:checked').value;
            const bottleOptions = document.getElementById('bottleOptions');
            
            if (feedingType === 'bottle') {
                bottleOptions.classList.add('active');
            } else {
                bottleOptions.classList.remove('active');
            }
        }

        // Toggle opções de mamadeira no modal de edição
        function toggleEditBottleOptions() {
            const feedingType = document.querySelector('input[name="editFeedingType"]:checked')?.value;
            const bottleOptions = document.getElementById('editBottleOptions');
            
            if (feedingType === 'bottle') {
                bottleOptions.classList.add('active');
            } else {
                bottleOptions.classList.remove('active');
            }
        }

        // Iniciar Amamentação
        function startFeeding() {
            const babyId = document.getElementById('selectedBaby').value;
            if (!babyId) {
                alert('Por favor, selecione um bebê primeiro!');
                return;
            }

            const feedingType = document.querySelector('input[name="feedingType"]:checked').value;
            let details = '';

            if (feedingType === 'bottle') {
                const milkType = document.querySelector('input[name="milkType"]:checked').value;
                const amount = document.getElementById('milkAmount').value;
                
                if (!amount) {
                    alert('Por favor, informe a quantidade em ml!');
                    return;
                }
                
                details = `Mamadeira - $${milkType === 'breast' ? 'Leite Materno' : 'Fórmula'} - $${amount}ml`;
            } else {
                details = feedingType === 'left' ? 'Peito Esquerdo' : 'Peito Direito';
            }

            activeFeeding = {
                babyId: parseInt(babyId),
                type: 'feeding',
                details: details,
                startTime: getBrazilDateTimeISO()
            };

            document.getElementById('startFeedingBtn').disabled = true;
            document.getElementById('stopFeedingBtn').disabled = false;
            document.getElementById('feedingStatus').classList.remove('status-inactive');
            document.getElementById('feedingStatus').classList.add('status-active');
            document.getElementById('feedingStatus').textContent = 'Em Andamento';

            feedingInterval = setInterval(updateFeedingTimer, 1000);
            localStorage.setItem('activeFeeding', JSON.stringify(activeFeeding));
        }

        // Parar Amamentação
        function stopFeeding() {
            if (!activeFeeding) return;

            activeFeeding.endTime = getBrazilDateTimeISO();
            activeFeeding.duration = Math.floor((activeFeeding.endTime - new Date(activeFeeding.startTime)) / 1000);

            records.push(activeFeeding);
            localStorage.setItem('records', JSON.stringify(records));
            localStorage.removeItem('activeFeeding');

            activeFeeding = null;
            clearInterval(feedingInterval);

            document.getElementById('startFeedingBtn').disabled = false;
            document.getElementById('stopFeedingBtn').disabled = true;
            document.getElementById('feedingStatus').classList.remove('status-active');
            document.getElementById('feedingStatus').classList.add('status-inactive');
            document.getElementById('feedingStatus').textContent = 'Inativo';
            document.getElementById('feedingTimer').textContent = '';

            updateCharts();
            loadRecords();
            alert('Amamentação registrada com sucesso! 🍼');
        }

        // Iniciar Sono
        function startSleep() {
            const babyId = document.getElementById('selectedBaby').value;
            if (!babyId) {
                alert('Por favor, selecione um bebê primeiro!');
                return;
            }

            activeSleep = {
                babyId: parseInt(babyId),
                type: 'sleep',
                details: 'Sono',
                startTime: getBrazilDateTimeISO()
            };

            document.getElementById('startSleepBtn').disabled = true;
            document.getElementById('stopSleepBtn').disabled = false;
            document.getElementById('sleepStatus').classList.remove('status-inactive');
            document.getElementById('sleepStatus').classList.add('status-active');
            document.getElementById('sleepStatus').textContent = 'Dormindo';

            sleepInterval = setInterval(updateSleepTimer, 1000);
            localStorage.setItem('activeSleep', JSON.stringify(activeSleep));
        }

        // Parar Sono
        function stopSleep() {
            if (!activeSleep) return;

            activeSleep.endTime = getBrazilDateTimeISO();
            activeSleep.duration = Math.floor((activeSleep.endTime - new Date(activeSleep.startTime)) / 1000);

            records.push(activeSleep);
            localStorage.setItem('records', JSON.stringify(records));
            localStorage.removeItem('activeSleep');

            activeSleep = null;
            clearInterval(sleepInterval);

            document.getElementById('startSleepBtn').disabled = false;
            document.getElementById('stopSleepBtn').disabled = true;
            document.getElementById('sleepStatus').classList.remove('status-active');
            document.getElementById('sleepStatus').classList.add('status-inactive');
            document.getElementById('sleepStatus').textContent = 'Inativo';
            document.getElementById('sleepTimer').textContent = '';

            updateCharts();
            loadRecords();
            alert('Sono registrado com sucesso! 😴');
        }

        // Atualizar Timer de Amamentação
        function updateFeedingTimer() {
            if (!activeFeeding) return;
            const elapsed = Math.floor((getBrazilDateTimeISO() - new Date(activeFeeding.startTime)) / 1000);
            document.getElementById('feedingTimer').textContent = formatDuration(elapsed);
        }

        // Atualizar Timer de Sono
        function updateSleepTimer() {
            if (!activeSleep) return;
            const elapsed = Math.floor((getBrazilDateTimeISO() - new Date(activeSleep.startTime)) / 1000);
            document.getElementById('sleepTimer').textContent = formatDuration(elapsed);
        }

        // Verificar timers ativos ao carregar
        function checkActiveTimers() {
            const savedFeeding = localStorage.getItem('activeFeeding');
            const savedSleep = localStorage.getItem('activeSleep');

            if (savedFeeding) {
                activeFeeding = JSON.parse(savedFeeding);
                activeFeeding.startTime = new Date(activeFeeding.startTime);
                document.getElementById('startFeedingBtn').disabled = true;
                document.getElementById('stopFeedingBtn').disabled = false;
                document.getElementById('feedingStatus').classList.remove('status-inactive');
                document.getElementById('feedingStatus').classList.add('status-active');
                document.getElementById('feedingStatus').textContent = 'Em Andamento';
                feedingInterval = setInterval(updateFeedingTimer, 1000);
            }

            if (savedSleep) {
                activeSleep = JSON.parse(savedSleep);
                activeSleep.startTime = new Date(activeSleep.startTime);
                document.getElementById('startSleepBtn').disabled = true;
                document.getElementById('stopSleepBtn').disabled = false;
                document.getElementById('sleepStatus').classList.remove('status-inactive');
                document.getElementById('sleepStatus').classList.add('status-active');
                document.getElementById('sleepStatus').textContent = 'Dormindo';
                sleepInterval = setInterval(updateSleepTimer, 1000);
            }
        }

        // Formatar duração
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // Formatar data/hora
        function formatDateTime(date) {
            if (!date) return '-';
            const d = new Date(date);
            return d.toLocaleString('pt-BR', { 
                timeZone: 'America/Sao_Paulo',
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Trocar de aba
        function switchTab(tabName) {
            // Remover active de todas as abas
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Adicionar active na aba selecionada
            if (tabName === 'register') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('registerTab').classList.add('active');
            } else if (tabName === 'records') {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('recordsTab').classList.add('active');
                loadRecords();
            }
        }

        // Carregar registros na tabela
        function loadRecords() {
            filterRecords();
        }

        // Filtrar registros
        function filterRecords() {
            const babyFilter = document.getElementById('filterBaby').value;
            const typeFilter = document.getElementById('filterType').value;
            const tbody = document.getElementById('recordsTableBody');

            let filteredRecords = records.filter(record => {
                const babyMatch = babyFilter === 'all' || record.babyId == babyFilter;
                const typeMatch = typeFilter === 'all' || record.type === typeFilter;
                return babyMatch && typeMatch;
            });

            // Ordenar por data mais recente
            filteredRecords.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

            if (filteredRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Nenhum registro encontrado</td></tr>';
                return;
            }

            tbody.innerHTML = filteredRecords.map((record) => {
                const originalIndex = records.indexOf(record);
                const baby = babies.find(b => b.id === record.babyId);
                const babyName = baby ? baby.name : 'Desconhecido';
                const typeLabel = record.type === 'feeding' ? '🍼 Amamentação' : '😴 Sono';
                const duration = record.duration ? formatDuration(record.duration) : '-';

                return `
                    <tr>
                        <td>${babyName}</td>
                        <td>${typeLabel}</td>
                        <td>${record.details}</td>
                        <td>${formatDateTime(record.startTime)}</td>
                        <td>${formatDateTime(record.endTime)}</td>
                        <td>${duration}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="openEditModal(${originalIndex})">✏️ Editar</button>
                            <button class="action-btn delete-btn" onclick="deleteRecord(${originalIndex})">🗑️ Excluir</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Abrir modal de edição
        function openEditModal(index) {
            const record = records[index];
            if (!record) return;

            document.getElementById('editRecordIndex').value = index;
            document.getElementById('editBaby').value = record.babyId;
            document.getElementById('editType').value = record.type;
            document.getElementById('editStartTime').value = dateToDatetimeLocal(record.startTime);
            document.getElementById('editEndTime').value = dateToDatetimeLocal(record.endTime);

            // Mostrar/ocultar campos específicos
            updateEditFormFields();

            if (record.type === 'feeding') {
                // Analisar detalhes da amamentação
                if (record.details.includes('Peito Esquerdo')) {
                    document.querySelector('input[name="editFeedingType"][value="left"]').checked = true;
                } else if (record.details.includes('Peito Direito')) {
                    document.querySelector('input[name="editFeedingType"][value="right"]').checked = true;
                } else if (record.details.includes('Mamadeira')) {
                    document.querySelector('input[name="editFeedingType"][value="bottle"]').checked = true;
                    
                    // Extrair tipo de leite e quantidade
                    if (record.details.includes('Leite Materno')) {
                        document.querySelector('input[name="editMilkType"][value="breast"]').checked = true;
                    } else if (record.details.includes('Fórmula')) {
                        document.querySelector('input[name="editMilkType"][value="formula"]').checked = true;
                    }

                    // Extrair quantidade
                    const match = record.details.match(/(\d+)ml/);
                    if (match) {
                        document.getElementById('editMilkAmount').value = match[1];
                    }
                }
                toggleEditBottleOptions();
            }

            document.getElementById('editModal').classList.add('active');
        }

        // Fechar modal de edição
        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        // Atualizar campos do formulário de edição
        function updateEditFormFields() {
            const type = document.getElementById('editType').value;
            const feedingFields = document.getElementById('editFeedingFields');

            if (type === 'feeding') {
                feedingFields.style.display = 'block';
            } else {
                feedingFields.style.display = 'none';
            }
        }

        // Salvar edição do registro
        function saveEditRecord(event) {
            event.preventDefault();

            const index = parseInt(document.getElementById('editRecordIndex').value);
            const babyId = parseInt(document.getElementById('editBaby').value);
            const type = document.getElementById('editType').value;
            const startTime = new Date(document.getElementById('editStartTime').value);
            const endTime = new Date(document.getElementById('editEndTime').value);

            if (endTime <= startTime) {
                alert('A data/hora de fim deve ser posterior à data/hora de início!');
                return;
            }

            const duration = Math.floor((endTime - startTime) / 1000);
            let details = '';

            if (type === 'feeding') {
                const feedingType = document.querySelector('input[name="editFeedingType"]:checked').value;
                
                if (feedingType === 'bottle') {
                    const milkType = document.querySelector('input[name="editMilkType"]:checked').value;
                    const amount = document.getElementById('editMilkAmount').value;
                    
                    if (!amount) {
                        alert('Por favor, informe a quantidade em ml!');
                        return;
                    }
                    
                    details = `Mamadeira - ${milkType === 'breast' ? 'Leite Materno' : 'Fórmula'} - ${amount}ml`;
                } else {
                    details = feedingType === 'left' ? 'Peito Esquerdo' : 'Peito Direito';
                }
            } else {
                details = 'Sono';
            }

            records[index] = {
                babyId: babyId,
                type: type,
                details: details,
                startTime: startTime,
                endTime: endTime,
                duration: duration
            };

            localStorage.setItem('records', JSON.stringify(records));
            closeEditModal();
            loadRecords();
            updateCharts();
            alert('Registro atualizado com sucesso! ✅');
        }

        // Excluir registro
        function deleteRecord(index) {
            if (confirm('Tem certeza que deseja excluir este registro?')) {
                records.splice(index, 1);
                localStorage.setItem('records', JSON.stringify(records));
                loadRecords();
                updateCharts();
                alert('Registro excluído com sucesso!');
            }
        }

        // Exportar para Excel
        function exportToExcel() {
            const babyFilter = document.getElementById('filterBaby').value;
            const typeFilter = document.getElementById('filterType').value;

            let filteredRecords = records.filter(record => {
                const babyMatch = babyFilter === 'all' || record.babyId == babyFilter;
                const typeMatch = typeFilter === 'all' || record.type === typeFilter;
                return babyMatch && typeMatch;
            });

            if (filteredRecords.length === 0) {
                alert('Não há registros para exportar!');
                return;
            }

            // Preparar dados para o Excel
            const excelData = filteredRecords.map(record => {
                const baby = babies.find(b => b.id === record.babyId);
                return {
                    'Bebê': baby ? baby.name : 'Desconhecido',
                    'Tipo': record.type === 'feeding' ? 'Amamentação' : 'Sono',
                    'Detalhes': record.details,
                    'Início': formatDateTime(record.startTime),
                    'Fim': formatDateTime(record.endTime),
                    'Duração': record.duration ? formatDuration(record.duration) : '-'
                };
            });

            // Criar workbook e worksheet
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(excelData);

            // Ajustar largura das colunas
            ws['!cols'] = [
                { wch: 20 },
                { wch: 15 },
                { wch: 30 },
                { wch: 18 },
                { wch: 18 },
                { wch: 12 }
            ];

            XLSX.utils.book_append_sheet(wb, ws, 'Registros');

            // Gerar arquivo
            const fileName = `registros_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.xlsx`;
            XLSX.writeFile(wb, fileName);

            alert('Arquivo Excel exportado com sucesso! 📥');
        }

        // Variáveis dos gráficos
        let feedingChart = null;
        let sleepChart = null;

        // Atualizar gráficos
        function updateCharts() {
            const babyFilter = document.getElementById('babyFilterChart').value;
            const last7Days = getLast7Days();

            // Filtrar registros
            let filteredRecords = records;
            if (babyFilter !== 'all' && babyFilter !== '') {
                filteredRecords = records.filter(r => r.babyId == babyFilter);
            }

            // Dados de amamentação
            const feedingData = last7Days.map(date => {
                const dayRecords = filteredRecords.filter(r => {
                    if (r.type !== 'feeding' || !r.endTime) return false;
                    const recordDate = new Date(r.startTime).toLocaleDateString('pt-BR');
                    return recordDate === date;
                });
                
                const count = dayRecords.length;
                const totalMinutes = dayRecords.reduce((sum, r) => sum + (r.duration / 60), 0);
                
                return { count, totalMinutes: Math.round(totalMinutes) };
            });

            // Dados de sono
            const sleepData = last7Days.map(date => {
                const dayRecords = filteredRecords.filter(r => {
                    if (r.type !== 'sleep' || !r.endTime) return false;
                    const recordDate = new Date(r.startTime).toLocaleDateString('pt-BR');
                    return recordDate === date;
                });
                
                const count = dayRecords.length;
                const totalMinutes = dayRecords.reduce((sum, r) => sum + (r.duration / 60), 0);
                
                return { count, totalMinutes: Math.round(totalMinutes) };
            });

            // Criar/Atualizar gráfico de amamentação
            updateFeedingChart(last7Days, feedingData);
            
            // Criar/Atualizar gráfico de sono
            updateSleepChart(last7Days, sleepData);
        }

        // Obter últimos 7 dias
        function getLast7Days() {
            const days = [];
            for (let i = 6; i >= 0; i--) {
                const date = new Date();
                date.setDate(date.getDate() - i);
                days.push(date.toLocaleDateString('pt-BR'));
            }
            return days;
        }

        // Atualizar gráfico de amamentação
        function updateFeedingChart(labels, data) {
            const ctx = document.getElementById('feedingChart').getContext('2d');

            if (feedingChart) {
                feedingChart.destroy();
            }

            feedingChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Quantidade',
                            data: data.map(d => d.count),
                            backgroundColor: 'rgba(102, 126, 234, 0.6)',
                            borderColor: 'rgba(102, 126, 234, 1)',
                            borderWidth: 2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Total (minutos)',
                            data: data.map(d => d.totalMinutes),
                            backgroundColor: 'rgba(237, 137, 54, 0.6)',
                            borderColor: 'rgba(237, 137, 54, 1)',
                            borderWidth: 2,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Quantidade'
                            },
                            ticks: {
                                stepSize: 1
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Minutos'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    label += context.parsed.y;
                                    if (context.datasetIndex === 1) {
                                        const hours = Math.floor(context.parsed.y / 60);
                                        const minutes = context.parsed.y % 60;
                                        label += ` (${hours}h ${minutes}min)`;
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }

        // Atualizar gráfico de sono
        function updateSleepChart(labels, data) {
            const ctx = document.getElementById('sleepChart').getContext('2d');

            if (sleepChart) {
                sleepChart.destroy();
            }

            sleepChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Quantidade',
                            data: data.map(d => d.count),
                            backgroundColor: 'rgba(72, 187, 120, 0.6)',
                            borderColor: 'rgba(72, 187, 120, 1)',
                            borderWidth: 2,
                            yAxisID: 'y'
                        },
                        {
                            label: 'Total (minutos)',
                            data: data.map(d => d.totalMinutes),
                            backgroundColor: 'rgba(66, 153, 225, 0.6)',
                            borderColor: 'rgba(66, 153, 225, 1)',
                            borderWidth: 2,
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Quantidade'
                            },
                            ticks: {
                                stepSize: 1
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Minutos'
                            },
                            grid: {
                                drawOnChartArea: false,
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top'
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    label += context.parsed.y;
                                    if (context.datasetIndex === 1) {
                                        const hours = Math.floor(context.parsed.y / 60);
                                        const minutes = context.parsed.y % 60;
                                        label += ` (${hours}h ${minutes}min)`;
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        }
    </script>
